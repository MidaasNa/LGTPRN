<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Travel Operations CRM LGT - Updated</title>
<style>
body{font-family:Arial;background:#f4f6f9;margin:20px}
h1{background:#003366;color:white;padding:12px;border-radius:8px}
.card{background:white;padding:15px;border-radius:8px;margin-bottom:15px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.field{display:flex;flex-direction:column}
label{font-weight:bold;margin-bottom:4px}
input,select,textarea{padding:8px}
button{padding:10px 15px;margin-right:5px}
table{width:100%;border-collapse:collapse;background:white}
th,td{border:1px solid #ccc;padding:6px}
th{background:#ffeb3b}
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:15px}
.stat{background:white;padding:12px;text-align:center;border-radius:8px}
.voice-target{outline:3px solid #e53935 !important;background:#fff8f6}
#voiceStatus{display:inline-block;margin-left:8px;font-weight:bold}
#voiceStatus.live{color:#e53935}
#voiceStatus.off{color:#888}
button.active{background:#e53935;color:white}
</style>
</head>
<body>

<h1>Travel Operations CRM - LGT Hotel Stays</h1>

<div class="stats">
<div class="stat"><b id="tot">0</b><br>Total</div>
<div class="stat"><b id="opn">0</b><br>Open</div>
<div class="stat"><b id="pen">0</b><br>Pending</div>
<div class="stat"><b id="con">0</b><br>Confirmed</div>
<div class="stat"><b id="cls">0</b><br>Closed</div>
<div class="stat"><b id="nts">0</b><br>Total Nights</div>
</div>

<div class="card">
<div class="grid">
<div class="field"><label>Date</label><input id="date" readonly></div>
<div class="field"><label>Client</label><input id="client"></div>
<div class="field"><label>TR Number</label><input id="tr"></div>
<div class="field"><label>Guest Name</label><input id="guest"></div>

<div class="field"><label>Hotel Name</label><input id="hotel"></div>
<div class="field"><label>City</label><input id="city"></div>
<div class="field"><label>Country</label><input id="country"></div>
<div class="field"><label>Vendor</label><input id="vendor"></div>

<div class="field"><label>Check In (YYYY-MM-DD)</label><input id="checkin"></div>
<div class="field"><label>Check Out (YYYY-MM-DD)</label><input id="checkout"></div>
<div class="field"><label>No. of Nights</label><input id="nights" readonly></div>
<div class="field"><label>Booking Ref</label><input id="bookingref"></div>

<div class="field"><label>Handled By</label><input id="handled"></div>

<div class="field"><label>Priority</label>
<select id="priority"><option>Normal</option><option>Urgent</option></select></div>

<div class="field"><label>Status</label>
<select id="status">
<option>Open</option><option>Pending</option><option>Confirmed</option>
<option>Cancelled</option><option>Closed</option>
</select></div>
</div>

<br>
<label><b>Remarks</b></label>
<textarea id="remarks" style="width:100%;height:60px"></textarea>
<br><br>

<button onclick="saveRecord()">Save Request</button>
<button id="voiceBtn" onclick="startVoice()">🎤 Start Voice</button>
<button onclick="stopVoice()">🛑 Stop Voice</button>
<span id="voiceStatus" class="off">Voice off</span>
</div>

<div class="card">
<input id="search" placeholder="Search..." oninput="onSearchInput()">
<label><input type="checkbox" id="showClosed" onchange="render()"> Show Closed</label>
</div>

<table>
<thead>
<tr>
<th>Date</th><th>Client</th><th>TR Number</th><th>City</th>
<th>Hotel</th><th>Check In</th><th>Check Out</th>
<th>Nights</th><th>Status</th><th>Handled By</th><th>Action</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
let data=JSON.parse(localStorage.getItem('travelLGTUpdated')||'[]');

/* ---------- form basics ---------- */

function setToday(){
 const d=new Date();
 date.value=d.toISOString().split('T')[0];
}

function calculateNights(){
 if(!checkin.value || !checkout.value){
   nights.value='';
   return;
 }
 let diff=(new Date(checkout.value)-new Date(checkin.value))/86400000;
 nights.value=isNaN(diff)?'':Math.max(0,Math.round(diff));
}

function clearForm(){
 ['client','tr','guest','hotel','city','country','vendor','checkin','checkout','nights','bookingref','handled','remarks']
 .forEach(id=>document.getElementById(id).value='');
 priority.value='Normal';
 status.value='Open';
 setToday();
 client.focus();
}

function saveRecord(){
 calculateNights();
 data.push({
   date:date.value,client:client.value,tr:tr.value,guest:guest.value,
   hotel:hotel.value,city:city.value,country:country.value,vendor:vendor.value,
   checkin:checkin.value,checkout:checkout.value,nights:nights.value,
   bookingref:bookingref.value,handled:handled.value,
   priority:priority.value,status:status.value,remarks:remarks.value
 });
 localStorage.setItem('travelLGTUpdated',JSON.stringify(data));
 clearForm();
 render();
}

/* ---------- rendering (performance-optimized) ---------- */

const SEARCH_FIELDS=['client','tr','guest','hotel','city','country','vendor','checkin','checkout','bookingref','handled','remarks'];
let searchDebounceTimer=null;

function onSearchInput(){
 clearTimeout(searchDebounceTimer);
 searchDebounceTimer=setTimeout(render,150);
}

function rowSearchText(r){
 // build once per record per render instead of JSON.stringify-ing the whole object
 return SEARCH_FIELDS.map(f=>r[f]||'').join(' ').toLowerCase();
}

function render(){
 let totalNights=0,o=0,p=0,c=0,cl=0;
 let s=search.value.toLowerCase();
 let show=showClosed.checked;

 const frag=document.createDocumentFragment();

 data.forEach((r,i)=>{
   if(!show && r.status==='Closed') return;
   if(s && !rowSearchText(r).includes(s)) return;

   totalNights += Number(r.nights||0);
   if(r.status==='Open')o++;
   if(r.status==='Pending')p++;
   if(r.status==='Confirmed')c++;
   if(r.status==='Closed')cl++;

   const tr=document.createElement('tr');

   const cells=[r.date,r.client,r.tr,r.city,r.hotel,r.checkin,r.checkout,r.nights];
   cells.forEach(val=>{
     const td=document.createElement('td');
     td.textContent=val||'';
     tr.appendChild(td);
   });

   const statusTd=document.createElement('td');
   const sel=document.createElement('select');
   sel.dataset.index=i;
   ['Open','Pending','Confirmed','Cancelled','Closed'].forEach(opt=>{
     const o2=document.createElement('option');
     o2.textContent=opt;
     if(r.status===opt)o2.selected=true;
     sel.appendChild(o2);
   });
   statusTd.appendChild(sel);
   tr.appendChild(statusTd);

   const handledTd=document.createElement('td');
   handledTd.textContent=r.handled||'';
   tr.appendChild(handledTd);

   const actionTd=document.createElement('td');
   const delBtn=document.createElement('button');
   delBtn.textContent='Delete';
   delBtn.dataset.index=i;
   delBtn.dataset.action='delete';
   actionTd.appendChild(delBtn);
   tr.appendChild(actionTd);

   frag.appendChild(tr);
 });

 tbody.replaceChildren(frag);

 tot.innerText=data.length;
 opn.innerText=o; pen.innerText=p; con.innerText=c; cls.innerText=cl;
 nts.innerText=totalNights;
}

// event delegation: one listener for all status-change and delete actions,
// instead of rebuilding inline handlers on every row every render
tbody.addEventListener('change',e=>{
 if(e.target.tagName==='SELECT'){
   chg(Number(e.target.dataset.index),e.target.value);
 }
});
tbody.addEventListener('click',e=>{
 if(e.target.dataset.action==='delete'){
   delRec(Number(e.target.dataset.index));
 }
});

function chg(i,v){data[i].status=v;localStorage.setItem('travelLGTUpdated',JSON.stringify(data));}
function delRec(i){data.splice(i,1);localStorage.setItem('travelLGTUpdated',JSON.stringify(data));render();}

/* ---------- voice input (Web Speech API, focus-following, replace mode) ---------- */
/*
  Behavior:
  - Voice always types into whichever eligible field currently has focus.
  - Clicking into a different field mid-dictation immediately re-targets it.
  - Each recognized phrase REPLACES the full contents of the active field
    (does not append to existing text).
  - Only single-line inputs are eligible targets; Remarks textarea and
    readonly fields (Date, Nights) are skipped.
*/

const VOICE_ELIGIBLE_IDS=new Set([
 'client','tr','guest','hotel','city','country','vendor',
 'checkin','checkout','bookingref','handled','search'
]);

let recognition=null;
let voiceActive=false;
let currentVoiceTarget=null;

function isEligibleVoiceTarget(el){
 return el && el.tagName==='INPUT' && VOICE_ELIGIBLE_IDS.has(el.id) && !el.readOnly;
}

function setVoiceTarget(el){
 if(currentVoiceTarget) currentVoiceTarget.classList.remove('voice-target');
 currentVoiceTarget = isEligibleVoiceTarget(el) ? el : null;
 if(currentVoiceTarget) currentVoiceTarget.classList.add('voice-target');
}

// track focus across the whole document so voice follows the cursor
document.addEventListener('focusin',e=>{
 if(!voiceActive) return;
 setVoiceTarget(e.target);
});

function updateVoiceStatusUI(){
 const statusEl=document.getElementById('voiceStatus');
 const btn=document.getElementById('voiceBtn');
 if(voiceActive){
   statusEl.textContent = currentVoiceTarget
     ? ('Listening → ' + currentVoiceTarget.id)
     : 'Listening (click a field)';
   statusEl.className='live';
   btn.classList.add('active');
 } else {
   statusEl.textContent='Voice off';
   statusEl.className='off';
   btn.classList.remove('active');
 }
}

function startVoice(){
 const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
 if(!SpeechRecognition){
   alert('Speech recognition is not supported in this browser. Try Chrome or Edge.');
   return;
 }

 if(recognition){
   try{ recognition.stop(); }catch(err){}
 }

 recognition = new SpeechRecognition();
 recognition.lang='en-US';
 recognition.continuous=true;
 recognition.interimResults=false;

 recognition.onresult=function(event){
   const result=event.results[event.results.length-1];
   if(!result.isFinal) return;
   const transcript=result[0].transcript.trim();
   if(!transcript) return;

   // always re-check the live document focus right before writing,
   // so a click that happened a moment ago is respected
   const active=document.activeElement;
   if(isEligibleVoiceTarget(active)){
     setVoiceTarget(active);
   }

   if(currentVoiceTarget){
     currentVoiceTarget.value = transcript; // REPLACE, not append
     currentVoiceTarget.dispatchEvent(new Event('input',{bubbles:true}));
     if(currentVoiceTarget.id==='checkin' || currentVoiceTarget.id==='checkout'){
       calculateNights();
     }
     if(currentVoiceTarget.id==='search'){
       onSearchInput();
     }
   }
   updateVoiceStatusUI();
 };

 recognition.onerror=function(event){
   if(event.error==='no-speech') return; // ignore silence gaps
   console.warn('Speech recognition error:',event.error);
 };

 recognition.onend=function(){
   // auto-restart while voice mode is still toggled on (browsers stop
   // recognition periodically even during continuous listening)
   if(voiceActive){
     try{ recognition.start(); }catch(err){}
   }
 };

 voiceActive=true;
 setVoiceTarget(document.activeElement);
 try{ recognition.start(); }catch(err){}
 updateVoiceStatusUI();
}

function stopVoice(){
 voiceActive=false;
 if(recognition){
   try{ recognition.stop(); }catch(err){}
 }
 if(currentVoiceTarget) currentVoiceTarget.classList.remove('voice-target');
 currentVoiceTarget=null;
 updateVoiceStatusUI();
}

window.onload=function(){
 setToday();
 render();
 checkin.addEventListener('input',calculateNights);
 checkout.addEventListener('input',calculateNights);
}
</script>
</body>
</html>
